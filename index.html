<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Warlock MVP</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="game"></canvas>

  <div id="hud">
    <div><strong>Warlock MVP</strong></div>
    <div id="playerNameHud">Name: Player</div>
    <div id="hp">HP: 100</div>
    <div id="dummyHp">Dummy HP: 100</div>
    <div id="scoreHud">Score: 0</div>
    <div id="wlkHud">WLK: 0</div>
    <div id="roundTimerHud">Shrink In: 20s</div>
    <div id="controlsHud" class="hint">Fire: Mouse1 | Hook: E | Teleport: Space / Mouse2</div>
    <div class="hint warn">You can walk into the lava outside the platform</div>
  </div>

  <div id="topbar">
    <button id="hudToggleBtn" class="secondary">Hide Info</button>
    <button id="menuBtn" class="secondary">Menu</button>
  </div>

  <div id="mobileControls">
    <div class="mobileSide">
      <div id="moveJoystick" class="mobileJoystick">
        <div class="mobileJoystickBase"></div>
        <div id="moveJoystickThumb" class="mobileJoystickThumb"></div>
      </div>
      <div class="mobileLabel">Move</div>
    </div>
    <div class="mobileSide">
      <div class="mobileActions">
        <button class="mobileBtn big mainSkill" id="mobileFireBtn"><span class="mobileBtnIcon">🔥</span><span class="mobileBtnCooldown"></span><span class="mobileBtnText">Fire</span><div class="mobileDragArrow"></div></button>
        <button class="mobileBtn big subSkill" id="mobileHookBtn"><span class="mobileBtnIcon small">🪝</span><span class="mobileBtnCooldown"></span><span class="mobileBtnText">Hook</span><div class="mobileDragArrow"></div></button>
        <button class="mobileBtn big subSkill" id="mobileTeleportBtn"><span class="mobileBtnIcon small">✦</span><span class="mobileBtnCooldown"></span><span class="mobileBtnText">Blink</span><div class="mobileDragArrow"></div></button>
        <button class="mobileBtn big subSkill" id="mobileShieldBtn"><span class="mobileBtnIcon small">🛡️</span><span class="mobileBtnCooldown"></span><span class="mobileBtnText">Shield</span><div class="mobileDragArrow"></div></button>
        <button class="mobileBtn big subSkill" id="mobileMenuBtn"><span class="mobileBtnIcon small">☰</span><span class="mobileBtnText">Menu</span></button>
      </div>
    </div>
  </div>

  <div id="menuPanel">
    <div class="menuTitle">Menu</div>
    <div id="menuTabs">
      <button class="secondary tabBtn active" data-menu-tab="main">Main</button>
      <button class="secondary tabBtn" data-menu-tab="keybinds">Keybinds</button>
      <button class="secondary tabBtn" data-menu-tab="settings">Settings</button>
    </div>
    <div id="menuMain" class="menuPage active">
      <div class="row" style="flex-direction: column; align-items: stretch;">
        <button id="resumeBtn">Resume</button>
        <button id="musicToggleBtn" class="secondary">Music: On</button>
        <button id="toggleDummyBtn" class="secondary">Remove Dummy</button>
        <button id="toLobbyBtn" class="secondary">Go to Lobby</button>
        <button id="resetBtn" class="secondary">Reset Round</button>
      </div>
    </div>
    <div id="menuKeybinds" class="menuPage">
      <div id="menuBindList"></div>
      <div class="row" style="margin-top: 10px;">
        <button id="menuResetBindsBtn" class="secondary">Reset Keys</button>
      </div>
    </div>
    <div id="menuSettings" class="menuPage">
      <div class="sectionTitle">Aim Drag Sensitivity</div>
      <div class="row">
        <input id="aimSensitivitySlider" type="range" min="0.35" max="1.4" step="0.05" value="0.7" />
        <span id="aimSensitivityValue" class="tag">0.70x</span>
      </div>
    </div>
  </div>

  <div id="overlay">
    <div class="panel">
      <button id="lobbyMenuBtn" class="secondary">Menu</button>
      <div class="grid">
        <div>
          <div class="title">Warlock Lobby</div>
          <div id="lobbyTabs">
            <button class="secondary tabBtn active" data-lobby-tab="play">Play</button>
            <button class="secondary tabBtn" data-lobby-tab="store">Store</button>
          </div>
          <div id="lobbyPlay" class="lobbyPage active">
            <div class="twoCol">
              <div>
                <div class="sectionTitle">Your Name</div>
                <input id="nameInput" type="text" maxlength="16" placeholder="Enter your name" />
                <div class="sectionTitle">Character Color</div>
                <div id="colorRow" class="row"></div>
                <button id="startBtn" style="margin-top:20px">Enter Arena</button>
              </div>
              <div>
                <div class="previewPanel">
                  <canvas id="previewCanvas" width="320" height="240"></canvas>
                </div>
                <div id="inventoryList" class="inventoryGrid"></div>
              </div>
            </div>
          </div>
          <div id="lobbyStore" class="lobbyPage">
            <div id="wlkLobby">WLK Points: 0</div>
            <div id="storeList"></div>
          </div>
        </div>
        <div id="leaderboardList" class="leaderboard"></div>
      </div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
